<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Triangle Arb · Run Forensics</title>
<style>
:root{
  --bg:#0a0d10; --panel:#0f1418; --line:#1c252c; --line2:#243038;
  --text:#d6dde3; --dim:#7c8a93; --faint:#4f5b62;
  --green:#5fd28a; --red:#ff6660; --amber:#f5c95e; --cyan:#58c6e0;
  --gross:#bb8fff; --gridline:#172026;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font:13px/1.5 "JetBrains Mono","SF Mono","Menlo",ui-monospace,monospace;
  -webkit-font-smoothing:antialiased}
header{padding:22px 28px 16px;border-bottom:1px solid var(--line);
  display:flex;flex-direction:column;gap:6px;background:linear-gradient(180deg,#0d1216,#0a0d10)}
h1{margin:0;font:600 14px/1.2 monospace;letter-spacing:.18em;text-transform:uppercase}
h1 span{color:var(--cyan)}
.sub{color:var(--dim);font-size:11px;letter-spacing:.12em;text-transform:uppercase}
.kpis{padding:18px 28px;border-bottom:1px solid var(--line);display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1px;background:var(--line)}
.kpi{background:var(--panel);padding:12px 14px}
.kpi .v{font-size:18px;font-weight:600;letter-spacing:-.02em}
.kpi .l{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.14em;margin-top:2px}
.kpi.ok .v{color:var(--green)} .kpi.warn .v{color:var(--amber)} .kpi.bad .v{color:var(--red)}
main{padding:18px 28px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{position:sticky;top:0;z-index:2;background:#0d1418;color:var(--dim);
  font:600 10px/1.2 monospace;letter-spacing:.12em;text-transform:uppercase;
  text-align:right;padding:10px 8px;border-bottom:1px solid var(--line2);cursor:pointer;user-select:none;
  white-space:nowrap}
thead th:first-child{text-align:left}
thead th:hover{color:var(--text)}
thead th.sorted{color:var(--cyan)}
thead th.sorted::after{content:" ▾";font-size:9px}
thead th.sorted.asc::after{content:" ▴"}
tbody tr{border-bottom:1px solid var(--gridline)}
tbody tr:hover{background:#101820}
td{padding:8px 8px;text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
td.l{text-align:left}
td.path{color:var(--text);font-weight:500}
td.dim{color:var(--dim)}
td.id{color:var(--faint);font-size:11px}
.bar{display:inline-block;height:6px;border-radius:1px;vertical-align:middle;margin-left:6px;min-width:1px}
.cell-bar{display:flex;justify-content:flex-end;align-items:center;gap:6px}
.tag{display:inline-block;padding:2px 6px;font-size:10px;font-weight:600;
  letter-spacing:.06em;border-radius:2px;background:#16202a;color:var(--dim);
  border:1px solid var(--line2)}
.tag.WHI,.tag.WHIRLPOOL{color:#ff9a4d;border-color:#3d2818}
.tag.CLM,.tag.CLMM{color:#58c6e0;border-color:#163842}
.tag.CPM,.tag.CPMM{color:#f5c95e;border-color:#3d3315}
.tag.DLM,.tag.DLMM{color:#bb8fff;border-color:#2c1f3d}
.profit-pos{color:var(--green);font-weight:600}
.profit-neg{color:var(--red);font-weight:600}
.profit-zero{color:var(--dim)}
.gross-pos{color:var(--gross);font-weight:600}
.expand-btn{background:none;border:1px solid var(--line2);color:var(--dim);
  cursor:pointer;font:11px monospace;padding:1px 6px;border-radius:2px}
.expand-btn:hover{color:var(--cyan);border-color:var(--cyan)}
tr.legs{display:none}
tr.legs.open{display:table-row}
tr.legs td{padding:0;background:#080b0e}
.legs-wrap{padding:8px 30px 14px;border-bottom:1px solid var(--line)}
.legs-wrap table{width:100%}
.legs-wrap td,.legs-wrap th{padding:5px 8px;font-size:11px;border:none}
.legs-wrap th{color:var(--faint);text-transform:uppercase;letter-spacing:.1em;font-size:9px;text-align:right;border-bottom:1px solid var(--line)}
.legs-wrap th:first-child{text-align:left}
.legs-wrap td.l{text-align:left}
.legs-wrap .pool-addr{color:var(--faint);font-size:10px}
.controls{display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.controls input{background:var(--panel);border:1px solid var(--line2);color:var(--text);
  padding:6px 10px;font:12px monospace;border-radius:2px;min-width:200px}
.controls label{color:var(--dim);font-size:11px;letter-spacing:.08em;text-transform:uppercase}
.legend{display:flex;gap:18px;margin-top:6px;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em}
.legend span::before{content:"";display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.legend .leg-fee::before{background:var(--amber)}
.legend .leg-imp::before{background:var(--cyan)}
.legend .leg-gross::before{background:var(--gross)}
.legend .leg-prof::before{background:var(--red)}
.empty{padding:30px 20px;text-align:center;color:var(--dim);font-size:12px;background:var(--panel);border:1px solid var(--line);margin-top:18px}
</style>
</head>
<body>
<header>
  <h1>TRIANGLE ARB · <span>RUN FORENSICS</span></h1>
  <div class="sub" id="subline">— routes simulated · click ▸ to expand legs · click headers to sort</div>
</header>

<section class="kpis" id="kpis"></section>

<main>
  <div class="controls">
    <input id="filter" placeholder="filter routes (path / dex / id)…">
    <label>min gross bps</label>
    <input id="minGross" type="number" placeholder="any" style="min-width:80px">
  </div>

  <table id="routes">
    <thead>
      <tr>
        <th data-sort="routeId">Route</th>
        <th data-sort="path">Path</th>
        <th data-sort="dexCombo">DEX</th>
        <th data-sort="profitBps" class="sorted">Net&nbsp;bps</th>
        <th data-sort="feeBps">Fee&nbsp;bps</th>
        <th data-sort="impactBps">Impact&nbsp;bps</th>
        <th data-sort="tradeRatioPct">Size/TVL&nbsp;%</th>
        <th data-sort="grossEdgeBps">Gross&nbsp;bps</th>
        <th data-sort="edgeMinusFeesBps">Edge−Fee</th>
        <th></th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="legend">
    <span class="leg-prof">Net (profit)</span>
    <span class="leg-fee">Fees (LP)</span>
    <span class="leg-imp">Impact (depth)</span>
    <span class="leg-gross">Gross (= Net + Fee + Impact)</span>
  </div>

  <div id="emptyState" class="empty" style="display:none">No routes returned by the engine for this run.</div>
</main>

<script>
const ROUTES = [];

const tbody = document.querySelector('#routes tbody');
const fmtBps = (n) => (n>0?'+':'') + (Number.isInteger(Number(n))?n:Number(n).toFixed(2));
const cls = (n) => n>0 ? 'profit-pos' : (n<0 ? 'profit-neg' : 'profit-zero');
const fmtPct = (n) => Number(n).toFixed(4);

let sortKey = 'profitBps';
let sortAsc = false;
let filterText = '';
let minGross = null;

function maxAbs(arr, key){ return Math.max(1, ...arr.map(r => Math.abs(Number(r[key])||0))); }

function renderKpis(){
  const k = document.getElementById('kpis');
  if (!ROUTES.length) { k.innerHTML = ''; return; }
  const profitable = ROUTES.filter(r => r.profitBps > 0).length;
  const bestNet = ROUTES.reduce((m,r) => Math.max(m, r.profitBps), -Infinity);
  const maxGross = ROUTES.reduce((m,r) => Math.max(m, r.grossEdgeBps), -Infinity);
  const maxImpact = ROUTES.reduce((m,r) => Math.max(m, r.impactBps), 0);
  const minFee = ROUTES.reduce((m,r) => Math.min(m, r.feeBps), Infinity);
  k.innerHTML = `
    <div class="kpi ${profitable > 0 ? 'ok' : ''}"><div class="v">${ROUTES.length}</div><div class="l">Routes</div></div>
    <div class="kpi ${profitable > 0 ? 'ok' : 'bad'}"><div class="v">${profitable}</div><div class="l">Profitable</div></div>
    <div class="kpi ${bestNet > 0 ? 'ok' : 'warn'}"><div class="v">${fmtBps(bestNet)} bps</div><div class="l">Best Net</div></div>
    <div class="kpi"><div class="v">${fmtBps(maxGross)} bps</div><div class="l">Max Gross Edge</div></div>
    <div class="kpi ${maxImpact > 100 ? 'bad' : ''}"><div class="v">${maxImpact.toFixed(0)} bps</div><div class="l">Max Impact</div></div>
    <div class="kpi"><div class="v">${minFee} bps</div><div class="l">Min Fee</div></div>
  `;
  document.getElementById('subline').textContent =
    `${ROUTES.length} routes · ${profitable} profitable · click ▸ to expand legs · click headers to sort`;
}

function render(){
  if (!ROUTES.length) {
    document.getElementById('emptyState').style.display = 'block';
    document.querySelector('#routes').style.display = 'none';
    return;
  }
  let rows = ROUTES.filter(r => {
    if (filterText){
      const blob = (r.routeId+r.path+r.dexCombo).toLowerCase();
      if (!blob.includes(filterText.toLowerCase())) return false;
    }
    if (minGross !== null && r.grossEdgeBps < minGross) return false;
    return true;
  });
  rows.sort((a,b)=>{
    const A=a[sortKey], B=b[sortKey];
    if (typeof A === 'string') return sortAsc ? A.localeCompare(B) : B.localeCompare(A);
    return sortAsc ? (A-B) : (B-A);
  });

  const maxGross = maxAbs(rows,'grossEdgeBps');
  const maxFee = maxAbs(rows,'feeBps');

  tbody.innerHTML = '';
  for (const r of rows){
    const tr = document.createElement('tr');
    const grossBarW = Math.max(2, Math.abs(r.grossEdgeBps)/maxGross*60);
    const feeBarW = Math.max(2, r.feeBps/maxFee*40);
    tr.innerHTML = `
      <td class="l id">${r.routeId}</td>
      <td class="l path">${r.path}</td>
      <td class="l">${r.dexCombo.split('\u00b7').map(d=>`<span class="tag ${d}">${d}</span>`).join(' ')}</td>
      <td class="${cls(r.profitBps)}">${fmtBps(r.profitBps)}</td>
      <td><div class="cell-bar"><span>${r.feeBps}</span><span class="bar" style="width:${feeBarW}px;background:var(--amber)"></span></div></td>
      <td class="dim">${fmtPct(r.impactBps)}</td>
      <td class="dim">${fmtPct(r.tradeRatioPct)}</td>
      <td><div class="cell-bar"><span class="${r.grossEdgeBps>0?'gross-pos':'profit-neg'}">${fmtBps(r.grossEdgeBps)}</span><span class="bar" style="width:${grossBarW}px;background:var(--gross);opacity:${r.grossEdgeBps>0?1:.3}"></span></div></td>
      <td class="${cls(r.edgeMinusFeesBps)}">${fmtBps(r.edgeMinusFeesBps)}</td>
      <td><button class="expand-btn">▸</button></td>`;
    tbody.appendChild(tr);

    const tr2 = document.createElement('tr');
    tr2.className = 'legs';
    tr2.innerHTML = `<td colspan="10"><div class="legs-wrap">
      <table>
        <thead><tr>
          <th>Leg</th><th>DEX</th><th>From → To</th><th>In</th><th>Out</th>
          <th>Fee bps</th><th>Impact bps</th><th>Size/TVL %</th><th>Gross Impact %</th><th>Quote</th><th>Pool</th>
        </tr></thead>
        <tbody>${r.legs.map(l=>`
          <tr>
            <td>${l.legIndex}</td>
            <td><span class="tag ${l.dex.slice(0,3)}">${l.dex.slice(0,3)}</span></td>
            <td class="l">${l.inSym} → ${l.outSym}</td>
            <td>${(Number(l.inAmount)/1e9).toFixed(6)}</td>
            <td>${(Number(l.outAmount)/1e9).toFixed(6)}</td>
            <td>${l.feeBps}</td>
            <td>${Number(l.impactBps).toFixed(4)}</td>
            <td>${Number(l.tradeRatioPct).toFixed(4)}</td>
            <td>${Number(l.grossImpactPct).toFixed(4)}</td>
            <td class="dim">${l.quoteSource||''}</td>
            <td class="l pool-addr">${(l.pool||'').slice(0,8)}…${(l.pool||'').slice(-4)}</td>
          </tr>`).join('')}
        </tbody>
      </table></div></td>`;
    tbody.appendChild(tr2);

    tr.querySelector('.expand-btn').addEventListener('click', e => {
      e.stopPropagation();
      tr2.classList.toggle('open');
      e.target.textContent = tr2.classList.contains('open') ? '▾' : '▸';
    });
  }
}

document.querySelectorAll('th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const k = th.dataset.sort;
    if (sortKey === k) sortAsc = !sortAsc;
    else { sortKey = k; sortAsc = false; }
    document.querySelectorAll('th').forEach(x => x.classList.remove('sorted','asc'));
    th.classList.add('sorted');
    if (sortAsc) th.classList.add('asc');
    render();
  });
});
document.getElementById('filter').addEventListener('input', e => { filterText = e.target.value; render(); });
document.getElementById('minGross').addEventListener('input', e => { minGross = e.target.value === '' ? null : Number(e.target.value); render(); });

renderKpis();
render();
</script>
</body>
</html>
